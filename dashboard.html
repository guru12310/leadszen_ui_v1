<!DOCTYPE html>
<html>
  <head>
  <title>LeadsDashboard</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- ADD THIS -->
  <link rel="icon" type="image/png" href="assets/favicon.png">
</head>

<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>


    

<div class="sidebar">
  <h3>LeadsZen</h3>
  <a href="#">Dashboard</a>
  <a href="leads.html">Leads</a>
  <a href="profile.html">Profile</a>
</div>



<div class="main">

<div class="topbar">

  <div>
    <h2 id="welcome">Welcome</h2>
    <p class="sub">Here’s your business overview</p>
  </div>

<div class="profile" onclick="toggleMenu(event)">
    <span id="username">User</span>
    <div class="avatar" id="avatar">U</div>

    <!-- Dropdown -->
    <div class="dropdown" id="dropdown">
      <div class="user-info">
        <strong id="drop-name">User</strong><br>
        <small id="drop-email">email</small>
      </div>

      <hr>

      <div class="menu-item" onclick="goProfile()">Edit Profile</div>
      <div class="menu-item logout" onclick="logout()">Logout</div>
    </div>
  </div>

</div>


  <h2>Dashboard</h2>

  <!-- Cards -->
  <div class="cards">
    <div class="card blue" id="total"></div>
    <div class="card green" id="converted"></div>
    <div class="card orange" id="progress"></div>
    <div class="card red" id="lost"></div>
  </div>

    <!-- Table -->
  <div class="table-box">
    <h3>Recent Leads</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="leads"></tbody>
    </table>
  </div>
  <!-- Chart -->
  <div class="chart-box">
    <h3>Lead Analytics</h3>
    <canvas id="chart"></canvas>
  </div>



</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
