<html>
    <head>
  <title>Leads</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- ADD THIS -->
  <link rel="icon" type="image/png" href="assets/favicon.png">
</head>

<head>
  <title>Leads</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
  <h3>LeadsZen</h3>
  <a href="dashboard.html">Dashboard</a>
  <a href="leads.html">Leads</a>
  <a href="profile.html">Profile</a>
</div>

<div class="main">

      <div class="topbar">
      
        <div>
          <h2 id="welcome">Welcome</h2>
          <p class="sub">Here’s your business overview</p>
        </div>
      
        <div class="profile" onclick="toggleMenu(event)">
          <span id="username">User</span>
          <div class="avatar" id="avatar">U</div>
      
          <!-- Dropdown -->
          <div class="dropdown" id="dropdown">
            <div class="user-info">
              <strong id="drop-name">User</strong><br>
              <small id="drop-email">email</small>
            </div>
      
            <hr>
      
            <div class="menu-item" onclick="goProfile()">Edit Profile</div>
            <div class="menu-item logout" onclick="logout()">Logout</div>
          </div>
        </div>
      
      </div>
  <!-- Top -->
  <div class="topbar">
    <h2>Leads Management</h2>
<button onclick="openModal()">+ Add Lead</button>
  </div>

  <!-- Filters -->
<div class="filter-box">

  <div class="input-group">
    <input id="search" placeholder="🔍 Search name or phone">
  </div>

  <select id="status" class="select">
    <option value="">All Status</option>
    <option value="NEW">New</option>
    <option value="IN_PROGRESS">In Progress</option>
    <option value="CONVERTED">Converted</option>
    <option value="LOST">Lost</option>
  </select>

  <input type="date" id="from" class="date">
  <input type="date" id="to" class="date">

  <button id="applyBtn" class="apply-btn">Apply Filters</button>

</div>

  <!-- Table -->
  <div class="table-box">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Source</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="leads"></tbody>
    </table>
  </div>

<div class="pagination">
  <button onclick="prevPage()" id="prevBtn">Prev</button>
<button onclick="nextPage()" id="nextBtn">Next</button>

</div>



</div>

<div id="leadModal" class="modal">
  <div class="modal-content">
    <h3>Add Manual Lead</h3>

    <input id="m_name" placeholder="Name">
    <input id="m_phone" placeholder="Phone">
    <input id="m_location" placeholder="Location">

    <!-- ✅ Error message -->
    <p id="leadError" style="color:red; font-size:14px;"></p>

    <button onclick="saveLead()">Save</button>
    <button onclick="closeModal()" class="cancel">Cancel</button>
  </div>
</div>


<script src="./js/api.js"></script>
<script src="./js/leads.js"></script>
<script src="./js/dashboard.js"></script>

</body>
</html>
