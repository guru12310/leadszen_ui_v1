</head>

<head>

  <title>Login</title>

body {
  margin: 0;
  height: 100vh;

  background: url("/assets/imge2.jpg") no-repeat center center/cover;

  display: flex;
  justify-content: center;
  align-items: center;
}


    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 350px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #0f172a;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #6366f1;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #4f46e5;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #6366f1;
      text-decoration: none;
      font-weight: bold;
    }

    #error {
      color: red;
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>LeadsZen Login</h2>

  <!-- <input id="email" type="email" placeholder="Email" required> -->
  <input id="email" type="email" placeholder="Email" required
  oninvalid="this.setCustomValidity('Please enter your email')"
  oninput="this.setCustomValidity('')">
  <input id="password" type="password" placeholder="Password" required>

  <button onclick="login()">Login</button>

  <p id="error"></p>

  <div class="link">
    New user? <a href="register.html">Register</a>
  </div>
</div>

<script src="js/auth.js"></script>
<!-- Toast -->
<div id="toast" class="toast"></div>
</body>
</html>
