<!DOCTYPE html>
<html lang="en">

<head>
  <title>LeadsZen</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- ADD THIS -->
  <link rel="icon" type="image/png" href="assets/favicon.png">
</head>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Details</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      /* background: linear-gradient(135deg, #6366f1, #4f46e5); */
      background: linear-gradient(135deg, #c6c4f3, #96f1d3, #4747b2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      animation: fadeIn 0.6s ease;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #111827;
    }

    .input-group {
      margin-bottom: 15px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    input:focus,
    textarea:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #6366f1;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4f46e5;
    }

    .success {
      text-align: center;
      color: green;
      margin-top: 10px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media(max-width: 480px) {
      .container {
        padding: 20px;
      }
    }
  </style>

</head>

<body>

  <div class="container">
    <h2>Get Details</h2>

    <div class="input-group">
      <input id="name" placeholder="Your Name">
    </div>

    <div class="input-group">
      <input id="phone" placeholder="Phone Number">
    </div>

    <div class="input-group">
      <textarea id="message" placeholder="Your Requirement"></textarea>
    </div>

    <div class="input-group">
      <input id="location" placeholder="Location">
    </div>

    <button onclick="submitLead()">Submit</button>

    <p id="msg" class="success"></p>
  </div>

  <script>

    function getClientId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("client_id");
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.innerText = msg;
      t.className = "toast show";

      setTimeout(() => {
        t.className = "toast";
      }, 3000);
    }


    async function submitLead() {
      const clientId = getClientId();

      if (!clientId) {
        alert("Invalid link");
        return;
      }

      const data = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        message: document.getElementById("message").value,
        location: document.getElementById("location").value
      };

      await fetch(`https://leadszen-v1.onrender.com/api/lead/${clientId}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      // alert("Submitted successfully!");
      showToast("Your request has been received. We'll contact you shortly.");
      setTimeout(() => {
        window.location.href = "index.html";
      }, 7000);
    }


  </script>

  <div id="toast" class="toast"></div>
</body>

</html>
