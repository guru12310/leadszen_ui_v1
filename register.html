    body {
      margin: 0;
      height: 100vh;

      background: url("/images/imge2.jpg") no-repeat center center/cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 35px;
      border-radius: 16px;
      width: 380px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #0f172a;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #6366f1;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #4f46e5;
    }

    .link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #6366f1;
      text-decoration: none;
      font-weight: bold;
    }

    #error {
      color: red;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Create Account</h2>

    <input id="name" placeholder="Full Name">
    <input id="business" placeholder="Business Name">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="whatsapp" placeholder="WhatsApp Number">

    <button onclick="register()">Register</button>

    <p id="error"></p>

    <div class="link">
      Already have account? <a href="index.html">Login</a>
    </div>
  </div>

  <script src="js/api.js"></script>

  <script>
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.innerText = msg;
      t.className = "toast show";

      setTimeout(() => {
        t.className = "toast";
      }, 3000);
    }

    //     email: document.getElementById("email").value,
    //     password: document.getElementById("password").value,
    //     whatsapp_number: document.getElementById("whatsapp").value
    //   };

    //   const res = await apiCall('/auth/register', 'POST', data);

    //   if (res.success) {
    //     // alert("Account created!");
    //     // window.location.href = "index.html";

    //     showToast("Registered Successfully");
    //     setTimeout(() => {
    //       window.location.href = "index.html";
    //     }, 3000);

    //   } else {
    //     document.getElementById("error").innerText = res.message;
    //   }
    // }


    async function register() {
      const nameInput = document.getElementById("name");
      const businessInput = document.getElementById("business");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const whatsappInput = document.getElementById("whatsapp");
      const error = document.getElementById("error");

      const name = nameInput.value.trim();
      const business_name = businessInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      const whatsapp_number = whatsappInput.value.trim();

      // Reset error
      error.innerText = "";

      // ✅ Validation
      if (!name) {
        error.innerText = "Name is required";
        nameInput.focus();
        return;
      }

      if (!business_name) {
        error.innerText = "Business name is required";
        businessInput.focus();
        return;
      }

      if (!email) {
        error.innerText = "Email is required";
        emailInput.focus();
        return;
      }

      if (!emailInput.checkValidity()) {
        error.innerText = "Enter a valid email";
        emailInput.focus();
        return;
      }

      if (!password) {
        error.innerText = "Password is required";
        passwordInput.focus();
        return;
      }

      if (password.length < 6) {
        error.innerText = "Password must be at least 6 characters";
        passwordInput.focus();
        return;
      }

      if (!whatsapp_number) {
        error.innerText = "WhatsApp number is required";
        whatsappInput.focus();
        return;
      }

      // simple phone check (10 digits)
      if (!/^\d{10}$/.test(whatsapp_number)) {
        error.innerText = "Enter a valid 10-digit WhatsApp number";
        whatsappInput.focus();
        return;
      }

      try {
        // ✅ API call
        const res = await apiCall('/auth/register', 'POST', {
          name,
          business_name,
          email,
          password,
          whatsapp_number
        });

        if (res.success) {
          showToast("Registered Successfully");

          setTimeout(() => {
            window.location.href = "index.html";
          }, 2000);

        } else {
          error.innerText = res.message || "Registration failed";
        }

      } catch (err) {
        error.innerText = "Something went wrong. Try again.";
        console.error(err);
      }
    }

  </script>
  <div id="toast" class="toast"></div>

</body>
